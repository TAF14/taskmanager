{% extends 'base.html' %}
{% block title %}Delete Category{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h4><i class="bi bi-exclamation-triangle"></i> Delete Category</h4>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete category <strong>"{{ category.name }}"</strong>?</p>
                <p class="text-muted small">Tasks in this category will not be deleted, but will lose their category.</p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                        <a href="{% url 'category_list' %}" class="btn btn-outline-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
