{% extends 'base.html' %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow">
            <div class="card-header text-center bg-primary text-white">
                <h4><i class="bi bi-check2-square"></i> TaskManager</h4>
                <p class="mb-0">Sign in to your account</p>
            </div>
            <div class="card-body p-4">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-semibold">{{ field.label }}</label>
                        <input type="{{ field.field.widget.input_type }}" name="{{ field.html_name }}"
                               class="form-control {% if field.errors %}is-invalid{% endif %}"
                               {% if field.value %}value="{{ field.value }}"{% endif %}>
                        {% if field.errors %}<div class="invalid-feedback">{{ field.errors.0 }}</div>{% endif %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                <hr>
                <p class="text-center mb-0">Don't have an account? <a href="{% url 'register' %}">Register here</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
